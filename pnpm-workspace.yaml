packages:
  - "apps/*" # 应用：admin 管理后台、ipad 等
  - "packages/*" # 可复用包
  - "utils/*" # 共享工具：如 @utils/http-client

# 依赖版本目录（catalog）：全仓库统一版本源
# 子包 dependencies / devDependencies / peerDependencies 可用 "catalog:" 引用
catalog:
  # 运行时
  react: ^19.2.7
  react-dom: ^19.2.7

  # UI
  antd: ^6.5.0
  "@ant-design/icons": ^6.3.2

  # HTTP
  axios: ^1.18.1

  # Charts & Date
  echarts: ^6.1.0
  dayjs: ^1.11.21

  # Router
  react-router-dom: ^7.18.1

  # 构建
  vite: ^8.1.4
  "@vitejs/plugin-react-swc": ^4.3.1
  typescript: 6.0.3

  # 类型
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3

# 允许依赖在安装时执行 postinstall 等生命周期脚本（pnpm 默认可能拦截）
# Vite/SWC 链路需要；使用 sharp 等原生模块时可将 sharp 设为 true
allowBuilds:
  "@swc/core": true
  esbuild: true
  sharp: false

# 新版本发布后的最短等待天数，0 表示不等待、可用最新版（与 pnpm ncu 行为相关）
minimumReleaseAge: 0

# 强制锁定传递依赖版本，用于修复重复安装或已知兼容问题
overrides:
  "@rc-component/util": ^1.11.1

# peer 依赖解析规则：放宽第三方包声明的 peer 范围，减少安装告警
peerDependencyRules:
  ignoreMissing: [] # 需要忽略的缺失 peer 可填包名
  allowedVersions:
    react-lazy-load>react: ">=17"
    react-lazy-load>react-dom: ">=17"
